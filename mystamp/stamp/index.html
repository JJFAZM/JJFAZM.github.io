<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>スタンプを受け取る</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #5DCAA5 0%, #3BA88A 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: white;
      border-radius: 24px;
      padding: 40px 32px;
      max-width: 400px;
      width: 100%;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.15);
    }
    .stamp-icon { font-size: 64px; margin-bottom: 16px; }
    h1 { font-size: 22px; color: #1a1a1a; margin-bottom: 8px; }
    p { color: #666; font-size: 14px; line-height: 1.6; margin-bottom: 28px; }
    .btn {
      display: block; width: 100%; padding: 16px;
      border-radius: 50px; font-size: 16px; font-weight: bold;
      text-decoration: none; margin-bottom: 12px; transition: opacity 0.2s;
      cursor: pointer; border: none;
    }
    .btn:active { opacity: 0.8; }
    .btn-primary { background: #5DCAA5; color: white; }
    .divider { border: none; border-top: 1px solid #eee; margin: 24px 0; }
    .note { font-size: 12px; color: #999; }
    #status { margin-top: 16px; font-size: 13px; color: #5DCAA5; min-height: 20px; }
    .expire-info {
      background: #FFF8E1; border: 1px solid #FFE082;
      border-radius: 10px; padding: 10px 14px;
      font-size: 12px; color: #F57F17; margin-bottom: 16px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="stamp-icon">⭐</div>
    <h1>スタンプが届きました！</h1>
    <p>スタンプカードアプリでスタンプを受け取りましょう。</p>

    <div class="expire-info" id="expire-info" style="display:none">
      ⏰ <span id="expire-text"></span>
    </div>

    <button id="open-btn" class="btn btn-primary" onclick="openApp()">
      📱 アプリで受け取る
    </button>

    <div id="status"></div>

    <hr class="divider">
    <p class="note">アプリをお持ちでない方</p>
    <a href="https://apps.apple.com/jp/app/id_PLACEHOLDER" class="btn"
       style="border:2px solid #5DCAA5; color:#5DCAA5; background:transparent; margin-top:8px;">
      🍎 App Store でインストール
    </a>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const token = params.get('token');

    function openApp() {
      if (!token) {
        document.getElementById('status').textContent = 'URLが正しくありません。';
        return;
      }
      document.getElementById('status').textContent = 'アプリを起動中...';
      // カスタムスキームでアプリを起動（Universal Linksが効かない場合のフォールバック）
      window.location.href = 'stampcard://stamp?token=' + encodeURIComponent(token);
      setTimeout(function() {
        document.getElementById('status').textContent =
          'アプリが開かない場合はインストールしてください。';
      }, 1500);
    }

    window.addEventListener('load', function() {
      if (!token) {
        document.getElementById('open-btn').disabled = true;
        document.getElementById('status').textContent = 'URLが正しくありません。';
      }
    });
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>スタンプカードを受け取る</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #5DCAA5 0%, #3BA88A 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: white;
      border-radius: 24px;
      padding: 40px 32px;
      max-width: 400px;
      width: 100%;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.15);
    }
    .stamp-icon { font-size: 64px; margin-bottom: 16px; }
    h1 { font-size: 22px; color: #1a1a1a; margin-bottom: 8px; }
    p { color: #666; font-size: 14px; line-height: 1.6; margin-bottom: 28px; }
    .btn {
      display: block; width: 100%; padding: 16px;
      border-radius: 50px; font-size: 16px; font-weight: bold;
      text-decoration: none; margin-bottom: 12px;
      cursor: pointer; border: none; text-align: center;
    }
    .btn-primary { background: #5DCAA5; color: white; }
    .btn-store {
      border: 2px solid #5DCAA5; color: #5DCAA5;
      background: transparent; margin-top: 8px;
    }
    .divider { border: none; border-top: 1px solid #eee; margin: 24px 0; }
    .note { font-size: 12px; color: #999; margin-bottom: 0; }
    #status { margin-top: 12px; font-size: 13px; color: #999; min-height: 18px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="stamp-icon">🎴</div>
    <h1>スタンプカードが届きました！</h1>
    <p>スタンプカードアプリを開いてカードを受け取りましょう。</p>

    <!-- アプリを開くボタン（<a href> でカスタムスキームを直接指定） -->
    <a id="open-btn" href="#" class="btn btn-primary">
      📱 アプリで開く
    </a>

    <div id="status"></div>

    <hr class="divider">
    <p class="note">アプリをお持ちでない方</p>
    <a href="https://apps.apple.com/jp/app/id6745189434" class="btn btn-store">
      🍎 App Store でインストール
    </a>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const data = params.get('data');
    const share = params.get('share');
    const btn = document.getElementById('open-btn');
    const status = document.getElementById('status');

    if (data) {
      btn.href = 'stampcard://receive?data=' + encodeURIComponent(data);
    } else if (share) {
      btn.href = 'stampcard://receive?share=' + encodeURIComponent(share);
    } else {
      btn.href = '#';
      btn.style.opacity = '0.4';
      btn.style.pointerEvents = 'none';
      status.textContent = 'URLが正しくありません。';
    }

    btn.addEventListener('click', function() {
      if (!data && !share) return;
      status.textContent = 'アプリを起動しています...';
      setTimeout(function() {
        status.textContent = 'アプリが開かない場合はインストールしてください。';
      }, 1800);
    });
  </script>
</body>
</html>
